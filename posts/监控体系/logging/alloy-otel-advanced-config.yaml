# Alloy 高级配置 - 使用 OpenTelemetry Collector 协议输出
# 启用实时调试
livedebugging {
  enabled = true
}

# Kubernetes Pod 服务发现
discovery.kubernetes "pods" {
  role = "pod"
  
  selectors {
    role  = "pod"
    label = "app=flog"
  }
  
  # 可选：指定命名空间
  # namespaces {
  #   names = ["default", "monitoring"]
  # }
}

# 从 Kubernetes Pod 收集日志
loki.source.kubernetes "pods" {
  targets    = discovery.kubernetes.pods.targets
  forward_to = [otelcol.processor.attributes.add_labels.input]
}

# 添加属性处理器 - 为日志添加额外的标签
otelcol.processor.attributes "add_labels" {
  action {
    key    = "service.name"
    action = "insert"
    value  = "kubernetes-logs"
  }
  
  action {
    key    = "service.version"
    action = "insert"
    value  = "1.0.0"
  }
  
  action {
    key    = "deployment.environment"
    action = "insert"
    value  = "production"
  }
  
  output {
    logs = [otelcol.processor.resource.default.input]
  }
}

# 资源处理器 - 处理资源属性
otelcol.processor.resource "default" {
  attributes {
    key    = "cluster.name"
    action = "insert"
    value  = "kubernetes-cluster"
  }
  
  attributes {
    key    = "k8s.cluster.name"
    action = "insert"
    value  = "production-cluster"
  }
  
  output {
    logs = [otelcol.processor.batch.default.input]
  }
}

# 批处理器 - 优化传输效率
otelcol.processor.batch "default" {
  # 批处理配置
  send_batch_size      = 1024
  send_batch_max_size  = 2048
  timeout              = "5s"
  
  output {
    logs = [otelcol.exporter.otlphttp.default.input]
  }
}

# OpenTelemetry Collector OTLP HTTP 导出器
otelcol.exporter.otlphttp "default" {
  client {
    endpoint = "http://vlog-victoria-logs-cluster-vlinsert.monitoring.svc.kubeyy.com:9481/insert/opentelemetry"
    
    # 超时配置
    timeout = "30s"
    
    # 重试配置
    retry_on_failure {
      enabled         = true
      initial_interval = "1s"
      max_interval    = "30s"
      max_elapsed_time = "300s"
    }
    
    # 发送队列配置
    sending_queue {
      enabled      = true
      num_consumers = 10
      queue_size   = 1000
    }
    
    # 压缩配置
    compression = "gzip"
    
    # 可选：添加认证头
    # headers = {
    #   "Authorization" = "Bearer your-token"
    #   "X-Custom-Header" = "custom-value"
    # }
    
    # 可选：TLS 配置
    # tls {
    #   insecure = true
    #   # ca_file = "/path/to/ca.crt"
    #   # cert_file = "/path/to/client.crt"
    #   # key_file = "/path/to/client.key"
    # }
  }
}

# 可选：添加 Prometheus 指标导出
prometheus.exporter.self "alloy_metrics" {}

prometheus.scrape "alloy_metrics" {
  targets    = prometheus.exporter.self.alloy_metrics.targets
  forward_to = [prometheus.remote_write.default.receiver]
}

# 可选：Prometheus 远程写入
prometheus.remote_write "default" {
  endpoint {
    url = "http://prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
    
    # 可选：认证配置
    # basic_auth {
    #   username = "admin"
    #   password = "password"
    # }
  }
}